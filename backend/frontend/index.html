<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Cassino</title>

<style>
body{
  margin:0;
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  text-align:center;
}

.topo{
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

.box{
  background:#111827;
  padding:20px;
  border-radius:10px;
  width:300px;
  margin:auto;
}

input{
  width:90%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.crash{
  margin-top:40px;
  font-size:40px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="topo">🔥 Cassino PRO</div>

<div class="box">
<input id="email" placeholder="Email"><br>
<input id="senha" placeholder="Senha"><br>

<button onclick="register()">Cadastrar</button>
<button onclick="login()">Login</button>

<h2 id="saldo"></h2>
</div>

<div class="crash" id="crash">1.00x</div>

<button onclick="apostar()">APOSTAR</button>

<script>
let user;
const API = "https://dolti777.onrender.com";

function animarCrash(valor){
  let atual = 1;
  let intervalo = setInterval(()=>{
    atual += 0.05;
    crash.innerText = atual.toFixed(2) + "x";
    if(atual >= valor){
      clearInterval(intervalo);
    }
  },50);
}

async function register(){
 await fetch(API+"/register",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({email:email.value,senha:senha.value})});
 alert("Conta criada");
}

async function login(){
 let r = await fetch(API+"/login",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({email:email.value,senha:senha.value})});
 user = await r.json();
 saldo.innerText = "Saldo: "+user.saldo;
}

async function apostar(){
 let r = await fetch(API+"/bet",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({userId:user.id,valor:10,cashout:2})});

 let d = await r.json();

 animarCrash(d.crash);
 saldo.innerText = "Saldo: "+d.saldo;
}
</script>

</body>
</html>
