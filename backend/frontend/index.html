<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>DOLT77</title>

<style>
body{
  margin:0;
  background:#0b0f1a;
  color:white;
  font-family:Arial;
}

.topo{
  padding:20px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  background:#111827;
}

.container{
  display:flex;
  justify-content:center;
  margin-top:30px;
}

.box{
  background:#111827;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:5px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:5px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.crash{
  text-align:center;
  font-size:50px;
  margin-top:40px;
}

</style>
</head>

<body>

<div class="topo">🔥 DOLT77</div>

<div class="container">
<div class="box">

<input id="email" placeholder="Email">
<input id="senha" placeholder="Senha">

<button onclick="register()">Cadastrar</button>
<button onclick="login()">Login</button>

<h3 id="saldo"></h3>

</div>
</div>

<div class="crash" id="crash">1.00x</div>

<div class="container">
<div class="box">
<button onclick="apostar()">APOSTAR R$10</button>
</div>
</div>

<script>
let user;
const API = "https://dolti777.onrender.com";

function animar(valor){
 let atual = 1;
 let i = setInterval(()=>{
  atual += 0.05;
  crash.innerText = atual.toFixed(2)+"x";
  if(atual >= valor){
    clearInterval(i);
  }
 },40);
}

async function register(){
 await fetch(API+"/register",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({email:email.value,senha:senha.value})});
 alert("Conta criada");
}

async function login(){
 let r = await fetch(API+"/login",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({email:email.value,senha:senha.value})});
 user = await r.json();
 saldo.innerText = "Saldo: "+user.saldo;
}

async function apostar(){
 let r = await fetch(API+"/bet",{method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({userId:user.id,valor:10,cashout:2})});

 let d = await r.json();
 animar(d.crash);
 saldo.innerText = "Saldo: "+d.saldo;
}
</script>

</body>
</html>
