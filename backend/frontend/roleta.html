<!DOCTYPE html>
<html>
<body style="background:#0b0f1a;color:white;text-align:center">

<h1>🎡 Roleta</h1>
<h2 id="num">--</h2>

<button onclick="jogar()">GIRAR</button>

<script>
function jogar(){
 let n = Math.floor(Math.random()*37);
 num.innerText = n;

 if(n % 2 === 0){
   alert("Preto");
 } else {
   alert("Vermelho");
 }
}
</script>

</body>
