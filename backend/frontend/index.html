<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cassino</title>

<style>
body{
 margin:0;
 background:#0b0f1a;
 color:white;
 font-family:Arial;
}

.topo{
 display:flex;
 justify-content:space-between;
 padding:15px;
 background:#111827;
}

.grid{
 display:grid;
 grid-template-columns: repeat(2,1fr);
 gap:15px;
 padding:15px;
}

.card{
 background:#1f2937;
 padding:20px;
 border-radius:12px;
 text-align:center;
 font-size:18px;
 cursor:pointer;
 transition:0.2s;
}

.card:hover{
 transform:scale(1.05);
 background:#374151;
}

.bottom{
 position:fixed;
 bottom:0;
 width:100%;
 background:#111827;
 display:flex;
 justify-content:space-around;
 padding:10px;
}
</style>
</head>

<body>

<div class="topo">
 <div>🎰 Cassino</div>
 <div id="saldo"></div>
</div>

<div class="grid">
 <div class="card" onclick="ir('crash.html')">🚀 Crash</div>
 <div class="card" onclick="ir('roleta.html')">🎡 Roleta</div>
 <div class="card" onclick="ir('slot.html')">🎰 Slot</div>
 <div class="card" onclick="ir('dice.html')">🎲 Dice</div>
</div>

<div class="bottom">
 <div onclick="ir('index.html')">🏠</div>
 <div onclick="ir('carteira.html')">💸</div>
</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));
saldo.innerText="Saldo: "+user.saldo;

function ir(p){window.location=p;}
</script>

</body>
</html>
