<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DOLT77</title>

<style>
body{
 background:#0b0f1a;
 color:white;
 font-family:Arial;
 margin:0;
}

.topo{
 padding:20px;
 background:#111827;
 text-align:center;
 font-size:22px;
}

.grid{
 display:grid;
 grid-template-columns: repeat(2, 1fr);
 gap:20px;
 padding:20px;
}

.card{
 background:#1f2937;
 padding:20px;
 border-radius:10px;
 text-align:center;
 cursor:pointer;
 transition:0.3s;
}

.card:hover{
 transform:scale(1.05);
}
</style>
</head>

<body>

<div class="topo">🎰 Cassino PRO</div>

<div class="grid">
  <div class="card" onclick="ir('crash.html')">🚀 Crash</div>
  <div class="card" onclick="ir('roleta.html')">🎡 Roleta</div>
  <div class="card" onclick="ir('slot.html')">🎰 Slot</div>
  <div class="card" onclick="ir('admin.html')">👑 Admin</div>
</div>

<script>
function ir(pagina){
 window.location = pagina;
}
</script>

</body>
</html>
