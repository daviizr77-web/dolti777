<!DOCTYPE html>
<html>
<head>
<style>
body{margin:0;background:#0b0f1a;color:white;font-family:Arial;}

.topo{
 display:flex;
 justify-content:space-between;
 padding:15px;
 background:#111827;
}

.grid{
 display:grid;
 grid-template-columns: repeat(2,1fr);
 gap:15px;
 padding:15px;
}

.card{
 background:#1f2937;
 padding:20px;
 border-radius:10px;
 text-align:center;
 cursor:pointer;
}
</style>
</head>

<body>

<div class="topo">
 <div>🎰 Cassino</div>
 <div id="saldo"></div>
</div>

<div class="grid">
 <div class="card" onclick="ir('crash.html')">🚀 Crash</div>
 <div class="card" onclick="ir('carteira.html')">💸 Carteira</div>
</div>

<script>
let user = JSON.parse(localStorage.getItem("user"));

if(!user){
 window.location="login.html";
}

saldo.innerText="Saldo: "+user.saldo;

function ir(p){window.location=p;}
</script>

</body>
</html>
