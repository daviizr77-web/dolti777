<!DOCTYPE html>
<html>
<body style="background:#0b0f1a;color:white;text-align:center">

<h1>Login</h1>

<input id="email" placeholder="Email"><br><br>
<button onclick="login()">Entrar</button>

<script>
function login(){
 let user = {
   email: email.value,
   saldo: 100
 };

 localStorage.setItem("user", JSON.stringify(user));
 window.location = "index.html";
}
</script>

</body>
</html>
