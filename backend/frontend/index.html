<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DOLT77</title>

<style>
body{
 margin:0;
 background:#0b0f1a;
 color:white;
 font-family:Arial;
 text-align:center;
}

.topo{
 padding:20px;
 background:#111827;
 font-size:22px;
}

.crash{
 font-size:60px;
 margin-top:50px;
}

button{
 padding:12px;
 margin:10px;
 border:none;
 border-radius:6px;
 cursor:pointer;
 font-size:16px;
}

.apostar{ background:#22c55e; }
.cashout{ background:#ef4444; }

</style>
</head>

<body>

<div class="topo">DOLT77</div>

<h2 id="saldo">Saldo: --</h2>

<div class="crash" id="crash">1.00x</div>

<button class="apostar" onclick="apostar()">APOSTAR</button>
<button class="cashout" onclick="cashout()">CASHOUT</button>

<script>
let user = { id: 1, saldo: 100 };
let rodando = false;
let crashFinal = 0;
let atual = 1;
let intervalo;

saldo.innerText = "Saldo: " + user.saldo;

function iniciarRodada(){
 atual = 1;
 crash.innerText = "1.00x";

 crashFinal = (Math.random()*5)+1;
 rodando = true;

 intervalo = setInterval(()=>{
   atual += 0.02;
   crash.innerText = atual.toFixed(2)+"x";

   if(atual >= crashFinal){
     clearInterval(intervalo);
     rodando = false;
   }
 },30);
}

function apostar(){
 if(rodando) return;

 user.aposta = 10;
 user.saldo -= 10;
 saldo.innerText = "Saldo: " + user.saldo;

 iniciarRodada();
}

function cashout(){
 if(!rodando) return;

 clearInterval(intervalo);
 rodando = false;

 let ganho = user.aposta * atual;
 user.saldo += ganho;

 saldo.innerText = "Saldo: " + user.saldo;
}
</script>

</body>
</html>
