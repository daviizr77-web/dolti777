<!DOCTYPE html>
<html>
<body style="background:#0b0f1a;color:white;text-align:center">

<h1>🎰 Slot</h1>
<h2 id="res">---</h2>

<button onclick="spin()">SPIN</button>

<script>
function spin(){
 let s = ["🍒","💎","7️⃣","⭐"];
 let r = [
   s[Math.floor(Math.random()*4)],
   s[Math.floor(Math.random()*4)],
   s[Math.floor(Math.random()*4)]
 ];

 res.innerText = r.join(" ");

 if(r[0]==r[1] && r[1]==r[2]){
   alert("JACKPOT 💰");
 }
}
</script>
