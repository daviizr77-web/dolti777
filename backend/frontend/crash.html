<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crash</title>

<style>
body{
 margin:0;
 background:#0b0f1a;
 color:white;
 font-family:Arial;
}

.topo{
 display:flex;
 justify-content:space-between;
 padding:15px;
 background:#111827;
}

canvas{
 background:#020617;
 display:block;
 margin:auto;
 border-radius:10px;
}

.controls{
 text-align:center;
 margin-top:20px;
}

button{
 padding:10px;
 margin:5px;
 border:none;
 border-radius:5px;
 cursor:pointer;
}

.apostar{background:#22c55e;}
.cashout{background:#ef4444;}
</style>
</head>

<body>

<div class="topo">
  <div>🚀 Crash</div>
  <div id="saldo"></div>
</div>

<canvas id="grafico" width="400" height="200"></canvas>

<div class="controls">
  <h2 id="multi">1.00x</h2>
  <button class="apostar" onclick="apostar()">APOSTAR</button>
  <button class="cashout" onclick="cashout()">CASHOUT</button>
</div>

<script>
let user = JSON.parse(localStorage.getItem("user")) || {saldo:100};
localStorage.setItem("user", JSON.stringify(user));

saldo.innerText = "Saldo: " + user.saldo;

let canvas = document.getElementById("grafico");
let ctx = canvas.getContext("2d");

let pontos = [];
let rodando=false;
let atual=1;
let alvo=0;
let intervalo;

function desenhar(){
 ctx.clearRect(0,0,400,200);

 ctx.beginPath();
 ctx.moveTo(0,200);

 pontos.forEach((p,i)=>{
   ctx.lineTo(i*5,200 - p*30);
 });

 ctx.strokeStyle="lime";
 ctx.stroke();
}

function apostar(){
 if(rodando) return;

 pontos=[];
 atual=1;
 alvo=Math.random()*5+1;
 rodando=true;

 user.saldo -= 10;
 salvar();

 intervalo=setInterval(()=>{
   atual+=0.03;
   pontos.push(atual);

   multi.innerText=atual.toFixed(2)+"x";
   desenhar();

   if(atual>=alvo){
     clearInterval(intervalo);
     rodando=false;
     alert("Perdeu 💥");
   }
 },30);
}

function cashout(){
 if(!rodando) return;

 clearInterval(intervalo);
 rodando=false;

 let ganho = 10 * atual;
 user.saldo += ganho;
 salvar();

 alert("Ganhou "+ganho.toFixed(2));
}

function salvar(){
 localStorage.setItem("user", JSON.stringify(user));
 saldo.innerText="Saldo: "+user.saldo;
}
</script>

</body>
</html>
