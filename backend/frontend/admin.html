<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center">

<h1>👑 Admin</h1>

<input id="valor" placeholder="Adicionar saldo">
<button onclick="add()">Adicionar</button>

<script>
let saldo = 100;

function add(){
 saldo += Number(valor.value);
 alert("Novo saldo: " + saldo);
}
</script>

</body>
</html>
